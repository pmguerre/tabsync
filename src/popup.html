<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>TabSync</title>
  <style>
    body { min-width: 660px; height: 520px; font-family: sans-serif; margin: 12px; display: flex; flex-direction: column; box-sizing: border-box; }
    .mainwrap { display: flex; flex-direction: row; align-items: stretch; flex: 1; min-height: 0; }
    .sessions-col {
      min-width: 230px;
      max-width: 260px;
      height: 100%;
      overflow-y: auto;
      border-right: 1.5px solid #b8d4dd;
      padding-right: 7px;
    }
    .tabs-col {
      flex: 1;
      padding: 0 0 0 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: calc(100vw - 230px - 60px);
    }
    .tabs-list-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .tabs-title-list { background: #f7f7f7; border-radius: 6px; border: 1px solid #cce2ee; flex: 1 1 0%; min-height: 0; overflow-y: auto; padding: 6px; overflow-x: hidden; max-width: 100%; }
    .sess-title-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; cursor: pointer; border-radius: 4px; padding: 4px 6px; transition: background 0.13s; overflow: hidden; width: 100%; box-sizing: border-box; }
    .sess-title-item:hover { background: #e2eaff; }
    .tab-favicon { width: 16px; height: 16px; border-radius: 2px; display: block; }
    .favicon-wrap { position: relative; width: 16px; height: 16px; flex-shrink: 0; }
    .tab-remove { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; background: rgba(180,0,0,0.88); color: #fff; font-size: 8px; font-weight: bold; display: none; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; line-height: 1; }
    .favicon-wrap:hover .tab-remove { display: flex; }
    .tab-info { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .tab-title { color: #175ebd; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-url { color: #888; font-size: 11px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .group-header { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: bold; color: #444; padding: 6px 6px 2px 6px; border-left: 3px solid #ccc; margin-top: 6px; user-select: none; }
    .group-header-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tab-grouped { padding-left: 18px; }
    .top-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .top-bar input[type=text] { flex: 1; padding: 4px; }
    button { margin-top: 6px; cursor: pointer; border: none; background: none; font-size: 20px; padding: 3px 6px; }
    button:focus { outline: 1px dashed #999; }
    #saveBtn { margin-top: 0; font-size: 16px; padding: 5px 14px; border: 1px solid #53acf7; border-radius: 4px; background: #e2f5ff; cursor: pointer; }
    #saveBtn:hover { background: #b8d4dd; }
    .sessions-list { list-style: none; padding-left: 0; margin: 0; }
    .sessao { padding: 7px 4px 8px 4px; margin-bottom: 9px; border-radius: 6px; transition: background 0.18s; cursor: pointer; }
    .sessao.active { background: #e2f5ff; border: 1.7px solid #53acf7; }
    .sess-main { font-size: 20px; font-weight: bold; margin-bottom: 1px; }
    .sess-date { font-size: 12px; color: #555; margin-bottom: 2px; font-family: monospace; }
    .sess-btns { margin: 4px 0 8px 0; }
    .warn { color: #900; font-size: 12px; margin-top: 3px; }
    @media (max-width:820px) {
      body { min-width: 98vw !important; }
      .sess-title-item { max-width: 94vw; }
    }
  </style>
</head>
<body>
  <h3>Guardar sessão</h3>
  <div class="top-bar">
    <input type="text" id="sessionName" placeholder="Nome da sessão">
    <button id="saveBtn">Guardar</button>
  </div>
  <hr>
  <div class="mainwrap">
    <div class="sessions-col">
      <ul class="sessions-list" id="sessionsList"></ul>
    </div>
    <div class="tabs-col">
      <div class="tabs-list-wrap"><div class="tabs-title-list" id="tabsTitleList"></div></div>
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
