<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>TabSync</title>
  <style>
    body { min-width: 660px; min-height: 520px; font-family: sans-serif; margin: 12px; }
    .mainwrap { display: flex; flex-direction: row; align-items: stretch; height: 360px; min-height: 360px; }
    .sessions-col {
      min-width: 230px;
      max-width: 260px;
      height: 100%;
      overflow-y: auto;
      border-right: 1.5px solid #b8d4dd;
      padding-right: 7px;
    }
    .tabs-col {
      flex: 1;
      padding: 0 0 0 16px;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: calc(100vw - 230px - 60px);
    }
    .tabs-title-list { background: #f7f7f7; border-radius: 6px; border: 1px solid #cce2ee; flex:1; min-height:0; max-height:380px; overflow-y: auto; padding: 6px; font-size: 16px; overflow-x: hidden; max-width: 100%; }
    .sess-title-item { display:flex; align-items:center; gap:8px; margin-bottom:4px; cursor:pointer; border-radius:4px; padding:4px 6px; transition:background 0.13s; overflow:hidden; }
    .sess-title-item:hover { background:#e2eaff; }
    .tab-favicon { width:16px; height:16px; flex-shrink:0; border-radius:2px; }
    .tab-info { display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .tab-title { color:#175ebd; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tab-url { color:#888; font-size:11px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    button { margin-top: 6px; cursor:pointer; border:none; background:none; font-size:20px; padding:3px 6px; }
    button:focus { outline: 1px dashed #999; }
    input[type=text] { width: 70%; padding: 4px; }
    .sessions-list { list-style: none; padding-left: 0; margin:0; }

    .sessao { padding:7px 4px 8px 4px; margin-bottom: 9px; border-radius: 6px; transition: background 0.18s; cursor:pointer; }
    .sessao.active { background: #e2f5ff; border: 1.7px solid #53acf7; }
    .sess-main { font-size: 20px; font-weight: bold; margin-bottom: 1px; }
    .sess-date { font-size:12px; color:#555; margin-bottom:2px; font-family: monospace; }
    .sess-btns { margin:4px 0 8px 0; }
    .warn { color:#900; font-size:12px; margin-top:3px; }

    .tabs-list-wrap { flex: 1; min-height: 0; display:flex; flex-direction:column; }
    .tabs-title-list { background: #f7f7f7; border-radius: 6px; border: 1px solid #cce2ee; flex:1 1 0%; min-height:0; height:100%; overflow-y: auto; padding: 6px; font-size: 16px; overflow-x: hidden; max-width: 100%; }
    .sess-title-item { display:flex; align-items:center; gap:8px; margin-bottom:4px; cursor:pointer; border-radius:4px; padding:4px 6px; transition:background 0.13s; overflow:hidden; width:100%; box-sizing:border-box; }

    .tabs-header { font-weight:bold; margin:6px 0 4px 0; font-size:16px; }
    @media (max-width:820px) {
      body { min-width: 98vw !important; }
      .tabs-title-list, .sess-title-item { max-width: 94vw; }
    }
  </style>
</head>
<body>
  <h3>Guardar sessão</h3>
  <input type="text" id="sessionName" placeholder="Nome da sessão">
  <button id="saveBtn">Guardar sessão</button>
  <hr>
  <div class="mainwrap">
    <div class="sessions-col">
      <ul class="sessions-list" id="sessionsList"></ul>
    </div>
    <div class="tabs-col">
      <div class="tabs-header">Separadores da sessão selecionada</div>
      <div class="tabs-list-wrap"><div class="tabs-title-list" id="tabsTitleList"></div></div>
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
